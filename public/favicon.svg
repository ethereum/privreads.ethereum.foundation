  <!-- Top-right: Coral/Orange -->
  <polygon points="64,0 112,80 64,64" fill="#CC5B47"/>
  <!-- Mid-left: Green -->
  <polygon points="16,80 64,64 64,96" fill="#458945"/>
  <!-- Mid-right: Purple -->
